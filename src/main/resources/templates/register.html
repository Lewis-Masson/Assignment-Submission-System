<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ASS</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #16213e;
            padding: 50px 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            text-align: center;
        }
        h2 { color: #e0e0ff; margin-bottom: 10px; }
        p { color: #a0a0cc; margin-bottom: 40px; font-size: 0.95rem; }
        .role-buttons { display: flex; flex-direction: column; gap: 16px; }
        .btn {
            display: block;
            padding: 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-student { background: #4a4af0; color: white; }
        .btn-student:hover { background: #3a3ad0; }
        .btn-adviser {
            background: transparent;
            color: #4a4af0;
            border: 2px solid #4a4af0;
        }
        .btn-adviser:hover { background: #4a4af0; color: white; }
        .links {
            margin-top: 30px;
            color: #606080;
            font-size: 0.85rem;
        }
        .links a { color: #4a4af0; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Create Account</h2>
        <p>Select your role to continue</p>
        <div class="role-buttons">
            <a href="/register/student" class="btn btn-student">Student</a>
            <a href="/register/adviser" class="btn btn-adviser">Course Adviser</a>
        </div>
        <div class="links">
            Already have an account? <a href="/login">Login here</a>
        </div>
    </div>
</body>
</html>
