<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Course Adviser</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #16213e;
            padding: 40px;
            border-radius: 10px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .back { color: #a0a0cc; text-decoration: none; font-size: 0.85rem; display: block; margin-bottom: 20px; }
        .back:hover { color: white; }
        h2 { color: #e0e0ff; margin-bottom: 6px; }
        .subtitle { color: #a0a0cc; font-size: 0.9rem; margin-bottom: 30px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; margin-bottom: 6px; color: #a0a0cc; font-size: 0.9rem; }
        input {
            width: 100%; padding: 12px; border-radius: 6px;
            border: 1px solid #2a2a5e; background: #0f3460;
            color: white; font-size: 1rem;
        }
        input:focus { outline: none; border-color: #f0a04a; }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn {
            width: 100%; padding: 13px; background: #b07a10;
            color: white; border: none; border-radius: 6px;
            font-size: 1rem; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: #906a00; }
        .error {
            background: #ff4444; color: white; padding: 10px;
            border-radius: 6px; margin-bottom: 20px; text-align: center; font-size: 0.9rem;
        }
        .hint { font-size: 0.8rem; color: #606080; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <a href="/register" class="back">← Back</a>
        <h2>Course Adviser Registration</h2>
        <p class="subtitle">Create your adviser account</p>

        <div class="error" th:if="${error}" th:text="${error}"></div>

        <form method="post" action="/register/adviser" th:object="${user}">
            <input type="hidden" th:field="*{role}" value="ADVISER"/>
            <div class="row">
                <div class="form-group">
                    <label>First Name</label>
                    <input type="text" th:field="*{firstName}" placeholder="First name"
                           minlength="2" maxlength="50" required/>
                </div>
                <div class="form-group">
                    <label>Last Name</label>
                    <input type="text" th:field="*{lastName}" placeholder="Last name"
                           minlength="2" maxlength="50" required/>
                </div>
            </div>
            <div class="form-group">
                <label>Staff ID Number</label>
                <input type="text" th:field="*{staffId}" placeholder="e.g. STAFF001"
                       minlength="3" maxlength="20" required/>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" th:field="*{email}" placeholder="Enter your email" required/>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" th:field="*{password}" placeholder="Min 8 characters"
                       minlength="8" required/>
            </div>
            <div class="form-group">
                <label>Department</label>
                <input type="text" th:field="*{department}" placeholder="e.g. Computer Science"
                       minlength="2" maxlength="100" required/>
            </div>
            <div class="form-group">
                <label>Address</label>
                <input type="text" th:field="*{address}" placeholder="Your address"
                       minlength="5" maxlength="255" required/>
            </div>
            <div class="form-group">
                <label>Course ID / Name</label>
                <input type="text" th:field="*{courseId}" placeholder="e.g. CS101"
                       minlength="2" maxlength="20" required/>
            </div>
            <button type="submit" class="btn">Create Adviser Account</button>
        </form>
    </div>
</body>
</html>
